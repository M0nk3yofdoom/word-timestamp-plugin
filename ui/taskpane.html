<!DOCTYPE html>
<html lang="en">
<head>
      <meta charset="UTF-8">
      <title>WordTimestamp</title>
      <link rel="stylesheet" href="styles.css">
</head>
<body class="container">

      <!-- Error banner -->
      <div id="errorBanner" class="error-banner"></div>

      <!-- Debug Console (System Terminal) -->
      <div id="debug-container" class="hidden">
         <div class="debug-header">
            <span class="debug-header-title">⚙ System Terminal</span>
            <div class="debug-controls">
               <label class="debug-filter-label">
                  <select id="debugFilter" class="debug-filter">
                     <option value="all">All Levels</option>
                     <option value="info">INFO</option>
                     <option value="warn">WARN</option>
                     <option value="error">ERROR</option>
                     <option value="debug">DEBUG</option>
                  </select>
               </label>
               <button id="btnClearDebug" class="btn-tiny" title="Clear log">Clear</button>
               <label class="debug-toggle-label">
                  <input type="checkbox" id="btnToggleDebug">
                  <span class="toggle-switch"><span class="toggle-thumb"></span></span>
               </label>
            </div>
         </div>
         <div id="app-debug-log"></div>
      </div>

      <!-- Header -->
      <header class="header">
         <svg class="logo-icon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
         <h1>WordTimestamp</h1>
         <span id="statusBadge" class="badge">Ready</span>
      </header>

      <!-- Controls -->
      <div class="controls">
         <button id="btnRecord" class="btn btn-primary">
            <svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor"><circle cx="12" cy="12" r="8"/></svg>
           Record
         </button>
         <button id="btnStop" class="btn btn-secondary" disabled>
            <svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="1"/></svg>
           Stop
         </button>
         <button id="btnPause" class="btn btn-success" disabled>
            <svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor"><rect x="6" y="5" width="4" height="14"/><rect x="14" y="5" width="4" height="14"/></svg>
           Pause
         </button>
      </div>

      <!-- Info -->
      <div class="info">
         <div class="info-row"><span class="info-label">Session</span><span id="sessionId" class="info-value">—</span></div>
         <div class="info-row"><span class="info-label">Document</span><span id="docTitle" class="info-value">—</span></div>
         <div class="info-row"><span class="info-label">Events</span><span id="eventCount" class="info-value">0</span></div>
         <div class="info-row"><span class="info-label">Duration</span><span id="recordingTime" class="info-value">—</span></div>
         <div class="info-row"><span class="info-label">Last Save</span><span id="lastSaveMsg" class="info-value">—</span></div>
      </div>

      <!-- Playback (Visible when recording stops) -->
      <div id="playbackSection" class="playback-section" style="display:none">

         <!-- Temporal Timeline Visualization -->
         <div class="section-label">Temporal Timeline</div>
         <div id="timelineArea" class="timeline-area">
            <div class="timeline-container">
               <div id="timelineScrubber" class="timeline-scrubber">
                  <div id="timelineTrack" class="timeline-track">
                     <div id="timelineEvents" class="timeline-events"></div>
                     <div id="timelineIndicator" class="timeline-indicator"></div>
                  </div>
               </div>
               <!-- Zoom controls -->
               <div class="timeline-zoom-controls">
                  <button id="btnZoomIn" class="btn-timeline" title="Zoom In">+</button>
                  <input id="zoomSlider" class="zoom-slider" type="range" min="1" max="20" value="1" step="0.5">
                  <button id="btnZoomOut" class="btn-timeline" title="Zoom Out">−</button>
                  <span id="zoomLabel" class="zoom-label">1×</span>
               </div>
            </div>
         </div>

         <!-- Playback controls -->
         <div class="playback-controls">
            <button id="btnPlayPrev" class="btn btn-sm btn-secondary" title="Previous change">⏮</button>
            <button id="btnPlay" class="btn btn-sm btn-success">
               <svg viewBox="0 0 24 24" width="12" height="12" fill="currentColor"><polygon points="5 3 19 12 5 21"/></svg>
              Play
            </button>
            <button id="btnPlayNext" class="btn btn-sm btn-secondary" title="Next change">⏭</button>
            <input id="seekSlider" class="seek-slider" type="range" min="0" max="100" value="0">
            <span id="seekLabel" class="info-value seek-label">0s</span>
            <select id="speedSelect" class="speed-select">
               <option value="0.25">0.25×</option>
               <option value="0.5">0.5×</option>
               <option value="1" selected>1×</option>
               <option value="2">2×</option>
               <option value="4">4×</option>
               <option value="8">8×</option>
            </select>
         </div>

         <!-- Action row -->
         <div class="controls row">
            <button id="btnSaveLocal" class="btn btn-sm btn-secondary">Save Local</button>
            <button id="btnExportWtp" class="btn btn-sm btn-primary">Export .wtp</button>
         </div>
      </div>

      <!-- Global Actions -->
      <div class="controls row">
         <label id="btnImportWtp" class="btn btn-sm btn-secondary file-label">
           Import .wtp <input id="fileInput" type="file" accept=".wtp" style="display:none">
         </label>
         <button id="btnClearEvents" class="btn btn-sm btn-danger">Clear</button>
      </div>

      <div class="controls row">
         <button id="btnSaveDoc" class="btn btn-sm btn-secondary full">Save Document</button>
      </div>

      <!-- Event Log (detailed view) -->
      <div class="section-label">Event Log</div>
      <div id="eventList" class="event-list"></div>

      <script src="https://appsforoffice.microsoft.com/assets/webpack/1.10.2/Office.bundle.min.js"></script>
      <script type="module" src="./taskpane.js"></script>
</body>
</html>
